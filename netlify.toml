[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Edge function for dynamic Open Graph meta tags (for social sharing)
[[edge_functions]]
  path = "/*"
  function = "og-tags"

# Netlify subdomain → custom domain (301 permanent)
[[redirects]]
  from = "https://aisa-isbm-coe.netlify.app/*"
  to = "https://aisaclub.isbm.co.in/:splat"
  status = 301
  force = true

# www → non-www canonical redirect (301 permanent)
[[redirects]]
  from = "https://www.aisaclub.isbm.co.in/*"
  to = "https://aisaclub.isbm.co.in/:splat"
  status = 301
  force = true

# SPA routing — all paths serve index.html so React Router handles navigation
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
